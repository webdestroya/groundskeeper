version: "2"
output:
  sort-order:
    - file
    - linter
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
run:
  timeout: 5m
  build-tags:
    - darwin
linters:
  default: none
  enable:
    - asciicheck
    - depguard
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gosec
    - govet
    # - importas
    - ineffassign
    - makezero
    - misspell
    # - nonamedreturns
    # - prealloc
    - predeclared
    - staticcheck
    - unconvert
    - unused
    - forbidigo
  settings:
    forbidigo:
      exclude-godoc-examples: true
      analyze-types: true
      forbid:
        - pattern: 'os\.(ReadFile|ReadDir|Glob|WriteFile|Open|OpenFile|Remove|RemoveAll|Stat|Mkdir|MkdirAll|Create)'
          msg: You should use the afero library instead
        - pattern: 'http\.DefaultClient'
          msg: Use cmdutils.HTTPClient() instead
        - pattern: 'os\.(Getenv|LookupEnv)'
          msg: "Use the config package instead"
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/aws/aws-sdk-go/aws
              desc: use v2 sdk instead
            - pkg: log/slog
              desc: use github.com/webdestroya/x/logger instead
    gocritic:
      disabled-checks:
        - newDeref # it's wrong on generics
    gosec:
      excludes:
        - G704
        - G705
        - G115
        - G117
    govet:
      enable:
        - shadow
    errcheck:
      check-type-assertions: false
      check-blank: false
      disable-default-exclusions: false
      verbose: false
      exclude-functions:
        - github.com/charmbracelet/x/term.Restore
        - github.com/charmbracelet/x/ansi.Execute
        - (*net.TCPConn).SetNoDelay
        - (*net.TCPConn).SetLinger
        - (*net.TCPConn).Write
        - (*crypto/tls.Conn).Write
        - encoding/binary.Write
        - (net/http.ResponseWriter).Write
        - (*github.com/spf13/pflag.FlagSet).MarkHidden
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (github.com/jackc/pgx/v5.Tx).Rollback
    importas:
      alias:
        # AWS Resource Types
        - pkg: github.com/aws/aws-sdk-go-v2/service/ecs/types
          alias: ecsTypes
      no-unaliased: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - errcheck
          - gosec
        path: internal/dummyserver/
      # - linters:
      #     - errcheck
      #   text: "return value of `.*\\.(MarkFlag|MarkHidden).*`"
      - linters:
          - govet
        text: "shadow: declaration of \"err\" shadows"
      - linters:
          - staticcheck
        text: "ST1005:"
      - linters:
          - staticcheck
        text: "QF1001:"
      - linters:
          - gocritic
        text: "ifElseChain:"
      - linters:
          - gocritic
        text: "singleCaseSwitch:"
    paths:
      - scripts
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - scripts
      - third_party$
      - builtin$
      - examples$
