# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: groundskeeper

before:
  hooks:
    - go mod tidy

builds:
  - id: groundskeeper
    binary: groundskeeper
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    tags:
      - nodev
      - groundskeeper.release
    flags:
      - -trimpath
    ldflags:
      - "-s -w"
      - -X github.com/webdestroya/groundskeeper/internal/utils/buildinfo.Version={{.Version}}
      - -X github.com/webdestroya/groundskeeper/internal/utils/buildinfo.Date={{time "2006-01-02"}}
      - -X github.com/webdestroya/groundskeeper/internal/utils/buildinfo.Commit={{.Commit}}

checksum:
  name_template: "checksums.txt"

archives:
  - id: homebrew
    format_overrides:
      - goos: linux
        formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - README.md
      - LICENSE

source:
  enabled: true

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"


universal_binaries:
  - name_template: "{{ .ProjectName }}"
    replace: false

homebrew_casks:

  - ids:
      - homebrew
    name: groundskeeper
    repository:
      owner: webdestroya
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_SCOOP_GITHUB_TOKEN }}"
    url:
      template: "https://github.com/webdestroya/groundskeeper/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://github.com/webdestroya/groundskeeper"
    description: "Generic database migrations"
    skip_upload: auto
    commit_author:
      name: cloud87bot
      email: 114977785+cloud87bot@users.noreply.github.com
    binaries:
      - groundskeeper
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/groundskeeper"]

  # -
  #   << : *hbgen
  #   name: groundskeeper@v{{ .Major }}

dockers_v2:
  - images:
      - "ghcr.io/webdestroya/groundskeeper"
    tags:
      - "{{ .Tag }}"
      - latest
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

docker_signs:
  - cmd: cosign
    output: true
    args:
      - "sign"
      - "${artifact}"
      - "--yes"
